<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>离线模式 - 世界尽头的档案馆</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      color: #e8e4dc;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
      background:
        linear-gradient(180deg, rgba(10, 12, 16, 0.2), rgba(10, 12, 16, 0.76)),
        url('/images/Z.A.T.O_02_ca04.jpg') center / cover fixed no-repeat,
        #1e2128;
    }

    body::before {
      content: 'OFFLINE ARCHIVE / PLEASE RETURN BORROWED DREAMS';
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(212, 196, 168, 0.32);
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      white-space: nowrap;
      pointer-events: none;
    }

    .offline-container {
      width: min(620px, 100%);
      padding: 42px 40px 38px;
      border: 1px solid rgba(212, 196, 168, 0.22);
      background:
        linear-gradient(145deg, rgba(35, 38, 45, 0.88), rgba(17, 19, 24, 0.8)),
        repeating-linear-gradient(90deg, transparent 0, transparent 13px, rgba(255, 255, 255, 0.025) 13px, rgba(255, 255, 255, 0.025) 14px);
      box-shadow:
        0 28px 78px rgba(0, 0, 0, 0.46),
        0 0 0 1px rgba(255, 255, 255, 0.035) inset;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      text-align: center;
    }

    .icon {
      display: inline-grid;
      place-items: center;
      width: 64px;
      height: 64px;
      margin-bottom: 22px;
      border: 1px solid rgba(212, 196, 168, 0.45);
      color: #d4c4a8;
      font-size: 1.9rem;
      background: radial-gradient(circle, rgba(212, 196, 168, 0.18), rgba(18, 20, 26, 0.2));
      box-shadow: 0 0 30px rgba(212, 196, 168, 0.12);
    }

    .kicker {
      margin-bottom: 12px;
      color: rgba(106, 160, 154, 0.92);
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin-bottom: 16px;
      color: #fff8ea;
      font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "SimSun", serif;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 600;
      line-height: 1.16;
      text-shadow: 0 12px 30px rgba(0, 0, 0, 0.52);
    }

    p {
      margin: 0 auto 28px;
      max-width: 34em;
      color: rgba(232, 228, 220, 0.76);
      line-height: 1.86;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 30px;
    }

    .btn {
      min-width: 132px;
      padding: 11px 18px;
      border: 1px solid rgba(212, 196, 168, 0.28);
      color: #e8e4dc;
      background: linear-gradient(135deg, rgba(212, 196, 168, 0.13), rgba(18, 20, 26, 0.34));
      text-decoration: none;
      cursor: pointer;
      transition:
        transform 0.2s ease,
        border-color 0.2s ease,
        color 0.2s ease,
        background 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      border-color: rgba(212, 196, 168, 0.48);
      color: #fff8ea;
      background: linear-gradient(135deg, rgba(212, 196, 168, 0.22), rgba(106, 160, 154, 0.1));
    }

    .cached-articles {
      padding-top: 24px;
      border-top: 1px solid rgba(212, 196, 168, 0.16);
      text-align: left;
    }

    .cached-articles h2 {
      margin-bottom: 14px;
      color: rgba(232, 228, 220, 0.82);
      font-size: 0.86rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .cached-list {
      list-style: none;
    }

    .cached-list li {
      padding: 9px 0;
      border-bottom: 1px solid rgba(212, 196, 168, 0.08);
      color: rgba(232, 228, 220, 0.64);
    }

    .cached-list a {
      color: #d4c4a8;
      text-decoration: none;
    }

    .cached-list a:hover {
      color: #fff8ea;
    }

    @media (max-width: 640px) {
      body {
        padding: 18px;
        background-attachment: scroll;
      }

      body::before {
        display: none;
      }

      .offline-container {
        padding: 34px 24px 30px;
      }
    }
  </style>
</head>
<body>
  <main class="offline-container">
    <div class="icon" aria-hidden="true">⌁</div>
    <div class="kicker">Disconnected / Archive Mode</div>
    <h1>你已离线</h1>
    <p>
      当前网络连接不可用，但档案馆的离线索引还在。你仍可以回到首页，或阅读已经被浏览器保存过的文章。
    </p>
    <div class="actions">
      <button class="btn" type="button" onclick="location.reload()">刷新页面</button>
      <a href="/" class="btn">返回首页</a>
    </div>
    <section class="cached-articles" aria-labelledby="cachedTitle">
      <h2 id="cachedTitle">Cached Articles</h2>
      <ul class="cached-list" id="cachedList">
        <li>正在清点已缓存的档案……</li>
      </ul>
    </section>
  </main>

  <script>
    (function cleanupLocalPreview() {
      var isLocalPreview = ['localhost', '127.0.0.1', '0.0.0.0', '::1'].indexOf(location.hostname) !== -1;
      if (!isLocalPreview || sessionStorage.getItem('zatoLocalSwCleaned') === '1') return;

      sessionStorage.setItem('zatoLocalSwCleaned', '1');

      var unregister = 'serviceWorker' in navigator
        ? navigator.serviceWorker.getRegistrations().then(function(registrations) {
            return Promise.all(registrations.map(function(registration) {
              return registration.unregister();
            }));
          })
        : Promise.resolve();

      var clearCaches = 'caches' in window
        ? caches.keys().then(function(keys) {
            return Promise.all(keys.filter(function(key) {
              return key.indexOf('blog-') === 0;
            }).map(function(key) {
              return caches.delete(key);
            }));
          })
        : Promise.resolve();

      Promise.all([unregister, clearCaches]).then(function() {
        location.replace(location.href);
      });
    })();

    if ('caches' in window) {
      caches.open('blog-v51-pages').then(function(cache) {
        cache.keys().then(function(requests) {
          var list = document.getElementById('cachedList');
          var articles = requests
            .filter(function(req) {
              return req.url.indexOf('/archives/') !== -1 || req.url.endsWith('.html');
            })
            .slice(0, 10);

          if (articles.length > 0) {
            list.innerHTML = articles.map(function(req) {
              var url = new URL(req.url);
              var path = url.pathname;
              var title = decodeURIComponent(path.split('/').pop().replace('.html', '')) || '未命名文章';
              return '<li><a href="' + path + '">' + title + '</a></li>';
            }).join('');
          } else {
            list.innerHTML = '<li>暂无已缓存文章。上线后先浏览几篇，它们就会出现在这里。</li>';
          }
        });
      }).catch(function() {
        document.getElementById('cachedList').innerHTML = '<li>缓存档案暂时无法打开。</li>';
      });
    }
  </script>
</body>
</html>
